<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TimeTiles</title>
  <style>
    :root {
      --bg:        #FFFFFF;
      --surface:   #F8F8F8;
      --border:    #F0F0F0;
      --text:      #1A1A1A;
      --text2:     #555555;
      --text3:     #AAAAAA;
      --orange:    #FF8F00;
      --orange-bg: #FFF3E0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 14px 14px 0;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--orange-bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .brand-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .brand-sub  { font-size: 11px; color: var(--text3); margin-top: 1px; }

    .btn-refresh {
      margin-left: auto; background: none; border: none;
      cursor: pointer; font-size: 14px; color: var(--text3);
      padding: 4px; border-radius: 5px;
    }
    .btn-refresh:hover { color: var(--orange); }

    /* ── Tiles grid ── */
    .tiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tile {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      position: relative;
    }

    .tile.you-here  { border: 2px solid var(--orange); }
    .tile.nearest   { border: 1px solid #FFB300; background: #FFFDF5; }
    .tile.user-loc  { border: 1px dashed var(--orange); background: var(--orange-bg); }
    .tile.full-width { grid-column: span 2; }

    .tile-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 5px;
    }

    .tile-flag { font-size: 17px; }

    .tile-badge {
      font-size: 9px; font-weight: 700;
      padding: 2px 6px; border-radius: 8px;
      white-space: nowrap;
    }
    .badge-you     { background: var(--orange-bg); color: var(--orange); }
    .badge-nearest { background: #FFF3E0; color: #E65100; }
    .badge-loc     { background: rgba(255,143,0,0.15); color: var(--orange); }

    .tile-city    { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 1px; }
    .tile-offices { font-size: 10px; color: var(--text3); margin-bottom: 6px; line-height: 1.5; }
    .tile-time    { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .tile-meta    { font-size: 10px; color: var(--text3); margin-top: 2px; }

    /* ── Converter ── */
    .section-label {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .converter {
      background: var(--surface);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .conv-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .conv-row:last-child { margin-bottom: 0; }

    .conv-label {
      font-size: 11px; color: var(--text3);
      width: 44px; flex-shrink: 0;
    }

    .conv-control {
      flex: 1; padding: 7px 10px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 12px; color: var(--text);
      background: var(--bg); outline: none;
      font-family: inherit;
    }
    .conv-control:focus { border-color: var(--orange); }

    .conv-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 10px 0 8px;
    }

    .conv-result-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 3px 0;
    }
    .conv-result-city { font-size: 11px; color: var(--text2); }
    .conv-result-time { font-size: 12px; font-weight: 700; color: var(--text); }
    .conv-result-row.highlight .conv-result-time { color: var(--orange); }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="#FF8F00" stroke-width="1.8"/>
        <path d="M12 7v5l3 3" stroke="#FF8F00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">TimeTiles</div>
      <div class="brand-sub">Global office times</div>
    </div>
    <button class="btn-refresh" id="btn-refresh" title="Refresh">↺</button>
  </header>

  <div class="tiles" id="tiles"></div>

  <div class="section-label">Time converter</div>
  <div class="converter">
    <div class="conv-row">
      <div class="conv-label">Time</div>
      <input class="conv-control" type="time" id="conv-time"/>
    </div>
    <div class="conv-row">
      <div class="conv-label">From</div>
      <select class="conv-control" id="conv-from"></select>
    </div>
    <hr class="conv-divider"/>
    <div id="conv-results"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
